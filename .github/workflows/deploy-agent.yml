name: Deploy AI Agent to EC2

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'ai-agent/**'
      - '.github/workflows/deploy-agent.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-agent
          push: true
          tags: samarth3282/store-it-v2-agent:${{ github.sha }},samarth3282/store-it-v2-agent:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AGENT_EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull samarth3282/store-it-v2-agent:latest
            sudo docker stop ai-server || true
            sudo docker rm ai-server || true
            sudo docker run -d --name ai-server --restart unless-stopped -p 8000:8000 -e EXPRESS_API_URL=http://${{ secrets.BACKEND_EC2_HOST }}:5000 samarth3282/store-it-v2-agent:latest
