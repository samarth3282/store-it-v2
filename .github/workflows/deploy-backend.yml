name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: samarth3282/store-it-v2-backend:${{ github.sha }},samarth3282/store-it-v2-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull samarth3282/store-it-v2-backend:latest
            sudo docker rm -f $(sudo docker ps -q --filter publish=5000) || true
            sudo docker rm -f backend-server || true
            sudo docker run -d --name backend-server --restart unless-stopped -p 5000:5000 samarth3282/store-it-v2-backend:latest
